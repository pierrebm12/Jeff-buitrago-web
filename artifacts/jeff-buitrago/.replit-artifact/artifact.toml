kind = "web"
previewPath = "/"
title = "Jeff Buitrago - Artista"
version = "1.0.0"
id = "artifacts/jeff-buitrago"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23679

[services.development]
run = "pnpm --filter @workspace/jeff-buitrago run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jeff-buitrago", "run", "build" ]
publicDir = "artifacts/jeff-buitrago/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23679"
BASE_PATH = "/"
